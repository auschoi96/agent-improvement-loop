command: ['npm', 'run', 'start']
env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: AIL_CATALOG
    value: austin_choi_omni_agent_catalog
  - name: AIL_SCHEMA
    value: agent_improvement_loop
  - name: AIL_TRACE_CATALOG
    value: austin_choi_omni_agent_catalog
  - name: AIL_TRACE_SCHEMA
    value: mlflow_traces
  - name: AIL_DEFAULT_TARGET_WORKSPACE
    value: /Users/austin.choi/PycharmProjects2/agent-improvement-loop
  - name: AIL_APPLY_CATALOG
    value: austin_choi_omni_agent_catalog
  - name: AIL_APPLY_SCHEMA
    value: agent_improvement_loop
  # Select the Job-trigger apply transport (Phase C lane 3b). Generic literal,
  # correct for every deployment — subprocess is the default otherwise, but the
  # Node-only deployed image can't spawn the Python engine, so it must be `job`.
  - name: AIL_APPLY_TRANSPORT
    value: job
  # Numeric id of the pre-deployed `ail-apply-service` job to trigger. Injected
  # from the `apply-job` app resource (databricks.yml), whose id is the
  # deploy-time bundle variable `apply_job_id` — NOT hardcoded here, so the app
  # stays workspace-agnostic. Mirrors DATABRICKS_WAREHOUSE_ID <- sql-warehouse.
  - name: AIL_APPLY_JOB_ID
    valueFrom: apply-job
  - name: AIL_ONBOARDING_TRANSPORT
    value: job
  - name: AIL_ONBOARDING_JOB_ID
    valueFrom: onboarding-job
  # Select the Node-native labeling transport (docs/LABELING_UI.md). Generic
  # literal, correct for every deployment: the Node-only deployed image can't
  # spawn the Python labeling engine, so the labeling routes talk to the
  # Databricks-managed MLflow assessments REST API directly (NOT a per-grade Job
  # trigger — labeling is rapid-fire). Local dev/self-hosted omits this and falls
  # back to the subprocess engine. Reuses DATABRICKS_WAREHOUSE_ID (above) as the
  # SQL warehouse for the v4 UC tracing endpoints.
  - name: AIL_LABELING_TRANSPORT
    value: rest
  - name: AIL_LABEL_FLOOR
    value: '20'
  # Resolved from ail.readiness.ReadinessThresholds.quality_min_labels for this
  # deployment artifact. Runtime config rejects a missing/unresolved/invalid value.
