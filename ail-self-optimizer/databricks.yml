bundle:
  name: ail-self-optimizer

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID

resources:
  apps:
    app:
      name: 'ail-self-optimizer'
      description: 'Agent self-optimization L0 leaderboard'
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    workspace:
      host: https://fevm-austin-choi-omni-agent.cloud.databricks.com

    variables:
      sql_warehouse_id: 7d1d3dbb3ba65f2a
