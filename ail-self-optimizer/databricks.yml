bundle:
  name: ail-self-optimizer

variables:
  sql_warehouse_id:
    description: >-
      SQL Warehouse ID backing the analytics plugin. MUST be the same framework
      warehouse the publish job + scorers use (root bundle's `warehouse_id`), so a
      single CAN_USE grant covers the whole framework. Override with
      --var sql_warehouse_id=... or BUNDLE_VAR_sql_warehouse_id.
    default: ''
  apply_job_id:
    description: >-
      Numeric job id of the pre-deployed `ail-apply-service` job (created by the
      ROOT `ail-scheduled-publish` bundle) that the deployed app triggers for the
      approve/reject write-path (Phase C lane 3b, docs/DEPLOY.md §7). WORKSPACE-
      SPECIFIC — left empty in `main` so this bundle stays workspace-agnostic.
      Set it per deploy with `--var apply_job_id=<id>` (or
      BUNDLE_VAR_apply_job_id, or a target `variables:` override). It flows into
      the `apply-job` app resource below, and from there into the app's
      AIL_APPLY_JOB_ID env var via app.yaml's `valueFrom: apply-job`.
    default: ''
  onboarding_job_id:
    description: Numeric job id of the pre-deployed ail-onboarding-service job.
    default: ''
  gepa_job_id:
    description: Numeric job id of the pre-deployed ail-gepa-optimization job.
    default: ''
  l0_job_id:
    description: Numeric job id of ail-l0-publish-scheduled.
    default: ''
  rlm_job_id:
    description: Numeric job id of ail-continuous-rlm-scheduled.
    default: ''
  judge_backfill_job_id:
    description: Numeric job id of ail-judge-backfill.
    default: ''
  auto_align_job_id:
    description: Numeric job id of ail-auto-align.
    default: ''
  memory_job_id:
    description: Numeric job id of ail-advisory-memory-distiller.
    default: ''
  catalog:
    description: Unity Catalog catalog that holds the L0/app write-path tables.
    default: ''
  schema:
    description: Schema within catalog that holds the L0/app write-path tables.
    default: ''
  trace_schema:
    description: Unity Catalog schema used by Traces-in-Unity-Catalog experiments.
    default: mlflow_traces
  label_floor:
    description: Human labels required before MemAlign may trust a judge.
    default: '20'
  default_target_workspace:
    description: Optional local repo path used by Quick Connect for companion execution.
    default: ''

resources:
  apps:
    app:
      name: 'ail-self-optimizer'
      description: 'Agent self-optimization L0 leaderboard'
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to. Declaring the warehouse with
      # `permission: CAN_USE` makes the Apps platform AUTO-GRANT CAN_USE on this
      # warehouse to the app's auto-provisioned service principal at deploy — no
      # manual grant needed for the app. This auto-provisioned SP is the recommended
      # SINGLE framework SP: after first deploy, read its application id
      # (`databricks apps get ail-self-optimizer -o json` -> service_principal_client_id)
      # and pass it to the job bundle as framework_sp_id so the jobs run as the SAME
      # SP — one principal, one grant. See docs/DEPLOY.md.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        # The `ail-apply-service` job the app triggers on approve/reject (§7).
        # Declaring it as a resource with CAN_MANAGE_RUN makes the Apps platform
        # AUTO-GRANT that permission to the app SP at deploy (same mechanism as
        # sql-warehouse CAN_USE above) AND injects the job's numeric id into the
        # app env via app.yaml's `valueFrom: apply-job` (-> AIL_APPLY_JOB_ID).
        # id is the deploy-time `apply_job_id` var (empty in main) — never a
        # hardcoded, workspace-specific literal.
        - name: apply-job
          job:
            id: ${var.apply_job_id}
            permission: CAN_MANAGE_RUN
        - name: onboarding-job
          job:
            id: ${var.onboarding_job_id}
            permission: CAN_MANAGE_RUN
        - name: gepa-job
          job:
            id: ${var.gepa_job_id}
            permission: CAN_MANAGE_RUN
        - name: l0-job
          job:
            id: ${var.l0_job_id}
            permission: CAN_VIEW
        - name: rlm-job
          job:
            id: ${var.rlm_job_id}
            permission: CAN_VIEW
        - name: judge-backfill-job
          job:
            id: ${var.judge_backfill_job_id}
            permission: CAN_VIEW
        - name: auto-align-job
          job:
            id: ${var.auto_align_job_id}
            permission: CAN_VIEW
        - name: memory-job
          job:
            id: ${var.memory_job_id}
            permission: CAN_VIEW

targets:
  default:
    default: true
    # Target workspace + auth are resolved from the Databricks CLI profile given
    # at deploy time (e.g. `--profile dais-demo`, DATABRICKS_CONFIG_PROFILE, or
    # DATABRICKS_HOST). The host is intentionally not hardcoded here so the same
    # bundle deploys to any workspace; the warehouse id is overridable via the
    # sql_warehouse_id variable above.
