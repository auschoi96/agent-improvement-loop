bundle:
  name: ail-self-optimizer

variables:
  sql_warehouse_id:
    description: >-
      SQL Warehouse ID backing the analytics plugin. MUST be the same framework
      warehouse the publish job + scorers use (root bundle's `warehouse_id`), so a
      single CAN_USE grant covers the whole framework. Override with
      --var sql_warehouse_id=... or BUNDLE_VAR_sql_warehouse_id.
    default: 7d1d3dbb3ba65f2a

resources:
  apps:
    app:
      name: 'ail-self-optimizer'
      description: 'Agent self-optimization L0 leaderboard'
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to. Declaring the warehouse with
      # `permission: CAN_USE` makes the Apps platform AUTO-GRANT CAN_USE on this
      # warehouse to the app's auto-provisioned service principal at deploy — no
      # manual grant needed for the app. This auto-provisioned SP is the recommended
      # SINGLE framework SP: after first deploy, read its application id
      # (`databricks apps get ail-self-optimizer -o json` -> service_principal_client_id)
      # and pass it to the job bundle as framework_sp_id so the jobs run as the SAME
      # SP — one principal, one grant. See docs/DEPLOY.md.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    # Target workspace + auth are resolved from the Databricks CLI profile given
    # at deploy time (e.g. `--profile dais-demo`, DATABRICKS_CONFIG_PROFILE, or
    # DATABRICKS_HOST). The host is intentionally not hardcoded here so the same
    # bundle deploys to any workspace; the warehouse id is overridable via the
    # sql_warehouse_id variable above.
