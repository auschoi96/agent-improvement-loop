resources:
  jobs:
    optimization_cycle:
      name: ail-optimization-cycle
      description: >-
        Lane 2 — the unified optimization cycle: ONE scheduled cadence over ONE
        sampled trace set. Each firing (a) runs the in-cycle L3/RLM reviewer over
        the sampled recent traces (reusing ail.l3.continuous: sampling, idempotency,
        fail-closed failed-marker), then (b) runs the layered A+B loop controller —
        deterministic decision rules AND the LLM-agent planner, de-duped — proving
        each candidate on the frozen suite and gating on readiness + judge trust,
        then (c) publishes the resulting PENDING proposals to agent_proposed_actions
        (atomic per-agent REPLACE, idempotent). Propose-only: it registers no
        version, sets no alias, runs no CREATE — a human approves the apply in the
        app (lane 3). Replaces the retired arrival-triggered continuous_rlm job
        (its table_update trigger was infeasible: the trace store is a VIEW).
      tags:
        project: agent-improvement-loop
        tier: L2
        managed_by: dab

      # run_as is inherited from the bundle level (databricks.yml -> `run_as:
      # ${var.job_run_as}`), so the cycle shares the single framework identity (and
      # thus one warehouse grant) with publish/apply. That identity needs CAN_USE on
      # the trace-store warehouse, read/write on the MLflow trace store, and write on
      # the proposals table.

      # Scheduled cadence (default hourly). This is deliberately a schedule, not a
      # table_update trigger: the retired continuous_rlm job could not trigger on the
      # trace store because it is a VIEW (cc_trace_unified / cc_trace_metadata), not a
      # Delta table. Override optimization_cycle_pause_status to PAUSED to keep it
      # deployed-but-dormant.
      schedule:
        quartz_cron_expression: ${var.optimization_cycle_cron}
        timezone_id: ${var.schedule_timezone}
        pause_status: ${var.optimization_cycle_pause_status}

      # The cycle is idempotent (RLM idempotency skips already-reviewed traces; the
      # proposal publish is an atomic per-agent REPLACE, and proposal ids are
      # content-derived). HALO is expensive; never overlap runs.
      max_concurrent_runs: 1
      queue:
        enabled: true

      tasks:
        - task_key: optimization_cycle
          environment_key: serverless
          python_wheel_task:
            package_name: ail
            entry_point: ail-optimization-cycle
            named_parameters:
              agent: ${var.agent_name}
              experiment: ${var.experiment_id}
              warehouse-id: ${var.warehouse_id}
              catalog: ${var.catalog}
              schema: ${var.schema}
              # in-cycle RLM sampling knobs (the existing ail.l3.continuous scheme)
              judge-model: ${var.rlm_judge_model}
              max-results: ${var.rlm_max_results}
              max-reviews: ${var.rlm_max_reviews_per_run}
              sample-rate: ${var.rlm_sample_rate}
              min-tokens: ${var.rlm_min_tokens}
              reviewer-experiment: ${var.experiment_id}
              max-turns: ${var.rlm_max_turns}
              # operator-configured goal; deploying the bundle IS the human
              # confirmation the controller requires (goal-confirmed=true). Set it to
              # anything else to keep the goal unconfirmed (the cycle fails loud
              # rather than optimizing an unreviewed goal).
              objective-metric: ${var.objective_metric}
              goal-target: ${var.goal_target}
              goal-confirmed: ${var.goal_confirmed}
              planner-model: ${var.rlm_judge_model}
              # Empty by default -> the entrypoint mints a short-lived bearer from
              # the run-as identity. Set both to read a stored token from a secret
              # scope (production-hardened service-principal path).
              token-secret-scope: ${var.token_secret_scope}
              token-secret-key: ${var.token_secret_key}

      # Serverless compute. The `ail` wheel (+ deps: mlflow, databricks-sdk, pydantic)
      # is installed from the locally-built artifact; halo-engine is added because
      # the cycle runs the L3/RLM reviewer in-process.
      environments:
        - environment_key: serverless
          spec:
            environment_version: '3'
            dependencies:
              # File-relative: ../ reaches the bundle root where `uv build` writes dist/.
              - ../dist/*.whl
              # HALO is optional for the core package; the in-cycle RLM step needs it.
              - halo-engine>=0.1.26,<0.2
