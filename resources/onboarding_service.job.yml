resources:
  jobs:
    onboarding_service:
      name: ail-onboarding-service
      description: Deployed app transport for MLflow experiment, goals, judge, and registry onboarding.
      tags:
        project: agent-improvement-loop
        tier: onboarding
        managed_by: dab
      max_concurrent_runs: 4
      queue:
        enabled: true
      parameters:
        - name: request_id
          default: ''
      tasks:
        - task_key: onboard
          environment_key: serverless
          python_wheel_task:
            package_name: ail
            entry_point: ail-onboarding-job
            named_parameters:
              request-id: '{{job.parameters.request_id}}'
              warehouse-id: ${var.warehouse_id}
              catalog: ${var.catalog}
              schema: ${var.schema}
              trace-schema: ${var.trace_schema}
              goal-llm-endpoint: ${var.onboarding_goal_llm_endpoint}
              # The arrival-triggered RLM job id, resolved from the sibling resource in
              # this same bundle (no manual --var). A successful registration adds the
              # new agent's *_otel_spans table to that job's table_update trigger so the
              # RLM job WAKES on the new agent's traces (its body already reviews every
              # registered agent). Best-effort: a reconcile failure never fails onboarding.
              rlm-job-id: ${resources.jobs.continuous_rlm.id}
              judge-backfill-job-id: ${resources.jobs.judge_backfill.id}
              token-secret-scope: ${var.token_secret_scope}
              token-secret-key: ${var.token_secret_key}
      environments:
        - environment_key: serverless
          spec:
            environment_version: '3'
            dependencies:
              - ../dist/*.whl
              - databricks-agents==1.11.0
