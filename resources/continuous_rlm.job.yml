resources:
  jobs:
    continuous_rlm:
      name: ail-continuous-rlm
      description: >-
        Tier L3/RLM — arrival-triggered HALO reviewer for MLflow traces. The
        Databricks Jobs table_update trigger fires when the UC-backed MLflow trace
        Delta table changes; each firing scans only recent traces, skips traces
        that already carry rlm_* feedback, samples deterministically, and reviews
        at most ${var.rlm_max_reviews_per_run} traces. Reuses ail.l3.review_trace
        unchanged, so HALO parser failures remain fail-closed and subject traces
        only receive real parsed rlm_* assessments.
      tags:
        project: agent-improvement-loop
        tier: L3
        managed_by: dab

      # run_as is inherited from the bundle level (databricks.yml -> `run_as:
      # ${var.job_run_as}`), keeping the continuous reviewer on the same framework
      # identity as publish/apply. That identity needs CAN_USE on the trace-store
      # warehouse and trigger/read/write permissions on the MLflow trace store.

      # Trace-arrival trigger: monitor the UC-backed Delta table where MLflow traces
      # for ${var.experiment_id} land. This is deliberately not a daily cron; if a
      # workspace cannot use table_update on the trace store, replace this trigger
      # with a short periodic trigger and call that out in the PR/deploy notes.
      trigger:
        pause_status: ${var.rlm_trigger_pause_status}
        table_update:
          table_names:
            - ${var.trace_store_table}
          # Debounce bursts so a batch of trace writes becomes one bounded run.
          min_time_between_triggers_seconds: 300
          wait_after_last_change_seconds: 120

      # HALO is expensive. Never overlap runs; idempotency inside the runner skips
      # traces that already have any rlm_* assessment if a retry/queue race occurs.
      max_concurrent_runs: 1
      queue:
        enabled: true

      tasks:
        - task_key: review_new_traces
          environment_key: serverless
          python_wheel_task:
            package_name: ail
            entry_point: ail-continuous-rlm
            named_parameters:
              experiment: ${var.experiment_id}
              warehouse-id: ${var.warehouse_id}
              judge-model: ${var.rlm_judge_model}
              max-results: ${var.rlm_max_results}
              max-reviews: ${var.rlm_max_reviews_per_run}
              sample-rate: ${var.rlm_sample_rate}
              min-tokens: ${var.rlm_min_tokens}
              reviewer-experiment: ${var.experiment_id}
              max-turns: ${var.rlm_max_turns}
              # Empty by default -> the entrypoint mints a short-lived bearer from
              # the run-as identity. Set both to read a stored token from a secret
              # scope (production-hardened service-principal path).
              token-secret-scope: ${var.token_secret_scope}
              token-secret-key: ${var.token_secret_key}

      # Serverless compute. The `ail` wheel (+ deps, including halo-engine when
      # declared below) is installed from the artifact.
      environments:
        - environment_key: serverless
          spec:
            environment_version: '3'
            dependencies:
              # File-relative: ../ reaches the bundle root where `uv build` writes dist/.
              - ../dist/*.whl
              # HALO is optional for the core package, but this job is the L3
              # reviewer and must install it explicitly in the serverless env.
              - halo-engine>=0.1.26,<0.2
