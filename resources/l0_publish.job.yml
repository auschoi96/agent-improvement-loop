resources:
  jobs:
    l0_publish:
      name: ail-l0-publish-scheduled
      description: >-
        Tier A — recompute the L0 deterministic metrics and (atomically,
        idempotently) refresh the UC Delta tables that back the L0 leaderboard app.
        REGISTRY-DRIVEN MULTI-AGENT: one run reads every agent from the UC
        agent_registry (catalog.schema.agent_registry) and publishes each agent's OWN
        experiment as its own per-experiment L0 slice, with per-agent isolation (one
        agent's publish failure is logged and the run continues). Runs on a schedule
        so the dashboard stays a LIVING view of the corpus instead of a one-time
        snapshot. Reuses ail.metrics via ail.publish — no metric logic here.
      tags:
        project: agent-improvement-loop
        tier: A
        managed_by: dab

      # run_as is set ONCE at the bundle level (databricks.yml -> `run_as:
      # ${var.job_run_as}`), so this job and every future framework job share a
      # single identity — and therefore a single warehouse grant. Do NOT set a
      # per-job run_as here; that would fork the framework onto a second principal.
      # Default target (dais_demo): runs as the deploying identity. Deploy the
      # dais_demo_sp target with --var framework_sp_id=<app-sp-id> to run as the
      # single framework service principal (see docs/DEPLOY.md).

      # Defined and live by default (UNPAUSED). Override schedule_pause_status to
      # PAUSED to keep it deployed-but-dormant.
      schedule:
        quartz_cron_expression: ${var.publish_cron}
        timezone_id: ${var.schedule_timezone}
        pause_status: ${var.schedule_pause_status}

      # The publish is idempotent (REPLACE WHERE per experiment); never overlap runs.
      max_concurrent_runs: 1
      queue:
        enabled: true

      tasks:
        - task_key: publish_l0
          environment_key: serverless
          python_wheel_task:
            package_name: ail
            entry_point: ail-publish-job
            named_parameters:
              # Registry mode: NO per-agent `experiment` binding. The entrypoint reads
              # every agent from catalog.schema.agent_registry and publishes each one's
              # own experiment. (Pass an explicit experiment only for a local/manual
              # single-agent override; the schedule never does.) catalog/schema locate
              # the registry table AND are where each agent's L0 slice is written.
              warehouse-id: ${var.warehouse_id}
              catalog: ${var.catalog}
              schema: ${var.schema}
              # Empty by default -> the entrypoint mints a short-lived bearer from
              # the run-as identity. Set both to read a stored token from a secret
              # scope (production-hardened service-principal path).
              token-secret-scope: ${var.token_secret_scope}
              token-secret-key: ${var.token_secret_key}

      # Serverless compute. The `ail` wheel (+ its deps: mlflow, databricks-sdk,
      # pydantic) is installed into the run environment from the locally-built
      # artifact declared in databricks.yml.
      environments:
        - environment_key: serverless
          spec:
            environment_version: '3'
            # catalog/schema reach the entry point via named_parameters above.
            # (Serverless environment specs do not support environment_variables —
            # the platform drops the field — so it is intentionally not set here.)
            dependencies:
              # File-relative: ../ reaches the bundle root where `uv build` writes dist/.
              - ../dist/*.whl
