resources:
  jobs:
    memory_distiller:
      name: ail-advisory-memory-distiller
      description: >-
        Advisory memory (WRITE side / system of record). Each firing distils the
        recent agent-evaluation feedback attached to the trace store — the RLM/HALO
        rlm_* assessments AND the L2 MLflow-judge assessments (correctness,
        modularity, groundedness, token_efficiency) read from the OTEL annotations
        table — into short 'memory guideline' rows and writes them to the governed
        UC Delta table austin_choi_omni_agent_catalog.agent_improvement_loop.agent_memory.
        The distillation is driven in-process by the Claude Agent SDK query() loop
        (zero-secret Databricks FMAPI auth); a custom submit_memory @tool validates,
        applies the PROVENANCE WALL (any row whose source_trace_ids touch the frozen
        Task-Suite or Human-Anchor pools is dropped, never written), and INSERTs the
        survivors. WATERMARKED + idempotent: only feedback newer than the last
        successful run is processed, so a re-run over the same window writes no
        duplicate rows. The Lakebase sync + read/injection side are SEPARATE and not
        part of this job.
      tags:
        project: agent-improvement-loop
        tier: advisory-memory
        managed_by: dab

      # run_as is inherited from the bundle level (databricks.yml -> `run_as:
      # ${var.job_run_as}`), so this job shares the single framework identity (and
      # thus one warehouse grant) with the other jobs. That identity needs CAN_USE on
      # the warehouse, READ on the trace-store annotations table, and CREATE/MODIFY on
      # the memory schema. Do NOT set a per-job run_as here.

      # RLM and judge backfill append memory_events after assessments are durable.
      # The distiller watermark makes repeated/coalesced wake-ups idempotent.
      trigger:
        pause_status: ${var.memory_distiller_pause_status}
        table_update:
          table_names:
            - ${var.catalog}.${var.schema}.memory_events
          condition: ANY_UPDATED
          min_time_between_triggers_seconds: 60
          wait_after_last_change_seconds: 61

      # Idempotent (watermark skips already-processed feedback); the distill run holds
      # a single minted OAuth bearer with no refresh, so never overlap runs and keep
      # each firing bounded (max-turns + max-assessments below).
      max_concurrent_runs: 1
      timeout_seconds: 3600
      queue:
        enabled: true

      tasks:
        - task_key: distill_memory
          environment_key: serverless
          description: >-
            Claude Agent SDK distills recent RLM + judge feedback into agent_memory
            rows behind the provenance wall.
          spark_python_task:
            # File-relative like the ../dist/*.whl dep below: ../ reaches the bundle
            # root, so this is <bundle-root>/src/ail/jobs/memory_distiller.py.
            python_file: ../src/ail/jobs/memory_distiller.py
            parameters:
              # Registry mode: NO per-agent --experiment-id / --cohort / --annotations-table
              # binding. The entrypoint reads every agent from catalog.schema.agent_registry
              # and distils each one's OWN experiment from its OWN annotations_table, using
              # its agent_name as the (experiment, cohort) watermark scope. catalog/schema
              # locate the registry table AND are where each agent's memory is written.
              # There is deliberately NO global --annotations-table fallback: the OTEL
              # annotations table has no experiment_id, so a shared table cannot be
              # experiment-scoped and would pool feedback across agents. Each agent MUST
              # carry its own annotations_table in the registry; one without it is skipped
              # (loud, isolated). (Pass --experiment-id + --annotations-table only for a
              # local/manual single-agent override.)
              - --warehouse-id=${var.warehouse_id}
              - --catalog=${var.catalog}
              - --schema=${var.schema}
              - --model=${var.memory_distiller_model}
              - --max-turns=${var.memory_max_turns}
              - --max-assessments=${var.memory_max_assessments}
              - --task-suite-version=${var.memory_task_suite_version}
              - --groundtruth-root=${var.memory_groundtruth_root}
              # Empty by default -> the entrypoint mints a short-lived bearer from the
              # run-as identity. Set both to read a stored token from a secret scope.
              - --token-secret-scope=${var.token_secret_scope}
              - --token-secret-key=${var.token_secret_key}

      # Serverless compute mirroring the reference agent's shape: the Claude Agent SDK
      # runs IN-PROCESS. environment_version '3' (not the reference's client '2') keeps
      # this consistent with the other ail jobs AND gives Python 3.12 — the `ail` wheel
      # requires >=3.11, and the wheel is installed here so the entrypoint can import
      # ail.memory.* / ail.pools / the frozen Task Suite bundled into it.
      environments:
        - environment_key: serverless
          spec:
            environment_version: '3'
            dependencies:
              # File-relative: ../ reaches the bundle root where `uv build` writes dist/.
              - ../dist/*.whl
              # The Claude Agent SDK drives the in-process distillation query() loop.
              - claude-agent-sdk==0.2.114
              # nest_asyncio lets the SDK's asyncio loop run inside the job runtime
              # (same as the reference agent).
              - nest_asyncio
