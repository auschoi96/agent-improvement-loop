# Agent registry — the observability app's primary key onto agents.
#
# One MLflow experiment per agent (docs/OBSERVABILITY_APP.md). This file is the
# operator-facing, config-driven mirror of ail.registry.DEFAULT_REGISTRY; a test
# (tests/test_registry.py) keeps the two in sync. The publish tier
# (ail.publish_versions) writes this into the `agent_registry` UC table the app's
# agent switcher reads.
#
# Each agent: a friendly unique `agent_name`, its dedicated `experiment_id`, an
# optional `description`, an optional `judge_config` (per-agent L2 judges), an
# optional `tag_filter` (within-experiment sub-selection; omit for the whole
# experiment), and an optional `target_workspace`.
#
# `target_workspace` is the path / repo the open-ended executor (a LATER lane, L7b-2)
# edits and snapshots — the target agent's own source. Optional here (omit = "not
# configured yet"), but REQUIRED before that agent's AGENT_TASK proposals can be
# executed. Set it to the deployer's own checkout, e.g.:
#     target_workspace: /path/to/your/agent/repo
agents:
  - agent_name: claude_code
    experiment_id: "1301765275062543"
    reviewer_experiment_id: "1301765275062544"
    description: Claude Code CLI sessions (the reference agent).
    goal_config:
      objective_metric: total_tokens
      goal_direction: minimize
      goal_target: -0.30
      goal_target_kind: relative
      guardrail_judge: []
    annotations_table: austin_choi_omni_agent_catalog.mlflow_traces.claude_code_otel_annotations
    target_workspace: /Users/austin.choi/PycharmProjects2/agent-improvement-loop
    optimization_target:
      kind: claude_skill
      path: src/ail/optimize/assets/skills/token-efficient-execution/SKILL.md
      validation_command:
        - python
        - -m
        - pytest
        - -q
        - tests/test_optimize_lever.py
        - tests/test_gepa_runner.py
      validation_timeout_seconds: 900
