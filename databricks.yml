bundle:
  name: ail-scheduled-publish

include:
  - resources/*.yml

# Build the `ail` wheel locally before deploy; the serverless Job environment
# installs it (see resources/l0_publish.job.yml -> environments). `uv` is the
# fast PEP 517 builder; `python -m build --wheel` is an equivalent fallback.
artifacts:
  ail_wheel:
    type: whl
    path: .
    build: uv build --wheel

variables:
  experiment_id:
    description: MLflow experiment whose traces are summarized into the L0 tables.
    default: '660599403165942'
  warehouse_id:
    description: SQL warehouse id used to create + (atomically) populate the L0 UC Delta tables.
    default: 7d1d3dbb3ba65f2a
  catalog:
    description: Unity Catalog catalog that holds the L0 tables.
    default: austin_choi_omni_agent_catalog
  schema:
    description: Schema (within --catalog) that holds l0_session_metrics / l0_corpus_summary / l0_diagnosis.
    default: agent_improvement_loop
  publish_cron:
    description: >-
      Quartz cron for the refresh schedule (sec min hour day-of-month month day-of-week).
      Default is daily at 07:00. Override e.g. --var publish_cron='0 0 */6 * * ?' for every 6h.
    default: '0 0 7 * * ?'
  schedule_timezone:
    description: Timezone id for the schedule.
    default: UTC
  schedule_pause_status:
    description: UNPAUSED (schedule is live — the living-dashboard default) or PAUSED.
    default: UNPAUSED
  optimization_cycle_cron:
    description: >-
      Quartz cron for the unified optimization cycle (sec min hour day-of-month month
      day-of-week). Default is hourly. This is a schedule, not a trace-arrival trigger:
      the trace store is a VIEW, so the retired continuous_rlm table_update trigger was
      infeasible.
    default: '0 0 * * * ?'
  optimization_cycle_pause_status:
    description: UNPAUSED (the optimization cycle schedule is live) or PAUSED (dormant).
    default: UNPAUSED
  agent_name:
    description: Agent the optimization cycle scopes its cohort + proposals to.
    default: claude_code
  objective_metric:
    description: The optimization cycle's objective metric (the goal's target metric).
    default: total_tokens
  goal_direction:
    description: >-
      Optimization direction for the objective metric: 'minimize' (default) or
      'maximize'.
    default: minimize
  goal_target:
    description: >-
      The goal's target movement (relative fraction by default; e.g. -0.30 = a 30%
      reduction for a minimize objective).
    default: '-0.30'
  goal_target_kind:
    description: >-
      How goal_target is read: 'relative' (a fractional movement vs the baseline,
      the default) or 'absolute' (a target metric value).
    default: relative
  objective_baseline:
    description: >-
      Baseline value a relative objective target is measured against. Empty (the
      default) => the cycle treats the objective as not-yet-met rather than
      fabricating a baseline.
    default: ''
  guardrail_judge:
    description: >-
      Optional judge guardrail as 'name:threshold' (e.g. 'modularity:4.0'). Empty
      (the default) => no judge guardrail; a blank value is ignored by the cycle.
    default: ''
  goal_confirmed:
    description: >-
      'true' marks the operator-configured goal human-confirmed so the cycle runs;
      deploying this bundle with a configured goal IS that confirmation. Set to
      anything else to keep the cycle deployed-but-fail-loud on the unconfirmed goal.
    default: 'true'
  # RLM sampling knobs — shared by the IN-CYCLE L3/RLM reviewer inside
  # ail-optimization-cycle AND the standalone scheduled ail-continuous-rlm job.
  # Also the planner endpoint (rlm_judge_model doubles as optimization_cycle planner-model).
  rlm_judge_model:
    description: Databricks FMAPI serving endpoint used by HALO for in-cycle RLM reviews (and the planner).
    default: databricks-claude-sonnet-4-6
  rlm_sample_rate:
    description: Deterministic trace-id sample rate for the in-cycle RLM review.
    default: '0.10'
  rlm_max_reviews_per_run:
    description: Hard cap on HALO reviews performed by one cycle firing.
    default: '2'
  rlm_min_tokens:
    description: Token floor for in-cycle RLM candidates; set 0 to allow small traces.
    default: '50000'
  rlm_max_results:
    description: Max recent traces scanned per cycle firing before idempotency/sampling.
    default: '100'
  rlm_max_turns:
    description: HALO max turns per agent arm for in-cycle RLM reviews.
    default: '40'
  # Standalone scheduled ail-continuous-rlm job — the dedicated high-powered RLM
  # deep-reviewer (distinct from the lighter in-cycle sonnet reviewer above). It reuses
  # the shared rlm_* sampling knobs and the shared goal vars (objective_metric etc.) but
  # runs on its own model, schedule, and pause switch.
  continuous_rlm_judge_model:
    description: >-
      HALO judge serving endpoint for the standalone scheduled RLM job. Defaults to the
      most powerful VIABLE judge: databricks-gpt-5-5-pro (Databricks Claude endpoints
      reject HALO's always-on parallel_tool_calls; gpt-5-6 does not exist on the gateway).
    default: databricks-gpt-5-5-pro
  continuous_rlm_reasoning_effort:
    description: >-
      Explicit HALO reasoning-effort override for the standalone RLM job (none | minimal
      | low | medium | high | xhigh). Empty (the default) => auto-resolve from the judge
      model, so databricks-gpt-5-5-pro gets xhigh despite HALO's hyphen-blind prefix check.
    default: ''
  continuous_rlm_cron:
    description: >-
      Quartz cron for the standalone RLM job (sec min hour day-of-month month day-of-week).
      Default every 6h. A schedule, not a trace-arrival trigger: the trace store is a VIEW.
    default: '0 0 */6 * * ?'
  continuous_rlm_pause_status:
    description: UNPAUSED (the standalone RLM schedule is live) or PAUSED (deployed-but-dormant).
    default: UNPAUSED
  token_secret_scope:
    description: >-
      Optional Databricks secret scope holding the run-as bearer token for the
      v4 trace store (production-hardened path). Empty => the Job mints a
      short-lived OAuth bearer from its own run-as identity at runtime.
    default: ''
  token_secret_key:
    description: Secret key within token_secret_scope (only used when the scope is set).
    default: ''
  framework_sp_id:
    description: >-
      Application (client) id of the SINGLE framework service principal that all
      framework jobs (this publish job + future scheduled scorers / L3 / MemAlign)
      run as, so ONE warehouse grant covers everything. Empty (the default) => jobs
      run as the deploying identity, which is what the verification deploy and the
      default `dais_demo` target use. Set this AND deploy the `dais_demo_sp` target
      to run every job as the SP. Reuse the ail-self-optimizer App's auto-provisioned
      SP here so the App and the jobs share one identity and one grant (see
      docs/DEPLOY.md).
    default: ''
  job_run_as:
    description: >-
      run_as identity applied to every job in this bundle (bundle-level run_as is
      the single knob that covers the publish job AND any future jobs added to
      resources/). Defaults to the deploying user so the verification deploy needs
      no service principal; the `dais_demo_sp` target overrides it with
      ${var.framework_sp_id}.
    type: complex
    default:
      user_name: ${workspace.current_user.userName}

# Bundle-level run_as: applies to the publish job and every future job declared
# under resources/, so a single service principal (and thus a single warehouse
# CAN_USE grant) covers the whole framework. Override per-target via job_run_as.
run_as: ${var.job_run_as}

targets:
  # Single workspace target; host + auth resolve from the Databricks CLI profile
  # given at deploy time (e.g. --profile dais-demo). The host is intentionally not
  # hardcoded so the same bundle deploys to any workspace.
  #
  # `dais_demo` (default): jobs run as the deploying identity (job_run_as default).
  # Use this for the admin verification deploy — no service principal required.
  dais_demo:
    default: true

  # `dais_demo_sp`: identical workspace, but every job runs as the single framework
  # service principal. Deploy turnkey with the SP id as a plain string var, e.g.
  #   databricks bundle deploy -t dais_demo_sp --var framework_sp_id=<app-sp-id> --profile dais-demo
  # (Deploying this target without framework_sp_id fails fast with
  # "run_as section must specify exactly one identity" — that guard is intentional.)
  dais_demo_sp:
    variables:
      job_run_as:
        service_principal_name: ${var.framework_sp_id}
