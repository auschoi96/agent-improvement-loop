bundle:
  name: ail-scheduled-publish

include:
  - resources/*.yml

# Build the `ail` wheel locally before deploy; the serverless Job environment
# installs it (see resources/l0_publish.job.yml -> environments). `uv` is the
# fast PEP 517 builder; `python -m build --wheel` is an equivalent fallback.
artifacts:
  ail_wheel:
    type: whl
    path: .
    build: uv build --wheel

variables:
  experiment_id:
    description: MLflow experiment whose traces are summarized into the L0 tables.
    default: ''
  warehouse_id:
    description: SQL warehouse id used to create + (atomically) populate the L0 UC Delta tables.
    default: ''
  catalog:
    description: Unity Catalog catalog that holds the L0 tables.
    default: ''
  schema:
    description: Schema (within --catalog) that holds l0_session_metrics / l0_corpus_summary / l0_diagnosis.
    default: ''
  trace_schema:
    description: Unity Catalog schema used for MLflow Traces-in-Unity-Catalog experiments.
    default: mlflow_traces
  publish_cron:
    description: >-
      Quartz cron for the refresh schedule (sec min hour day-of-month month day-of-week).
      Default is daily at 07:00. Override e.g. --var publish_cron='0 0 */6 * * ?' for every 6h.
    default: '0 0 7 * * ?'
  schedule_timezone:
    description: Timezone id for the schedule.
    default: UTC
  schedule_pause_status:
    description: UNPAUSED (schedule is live — the living-dashboard default) or PAUSED.
    default: UNPAUSED
  agent_name:
    description: Agent the RLM/companion lanes scope their cohort + proposals to.
    default: claude_code
  onboarding_goal_llm_endpoint:
    description: Chat endpoint used to turn Quick Connect requirements into structured goals.
    default: databricks-claude-sonnet-4-6
  objective_metric:
    description: Objective metric used to steer RLM goal rubrics and local companion planning.
    default: total_tokens
  goal_direction:
    description: >-
      Optimization direction for the objective metric: 'minimize' (default) or
      'maximize'.
    default: minimize
  goal_target:
    description: >-
      The goal's target movement (relative fraction by default; e.g. -0.30 = a 30%
      reduction for a minimize objective).
    default: '-0.30'
  goal_target_kind:
    description: >-
      How goal_target is read: 'relative' (a fractional movement vs the baseline,
      the default) or 'absolute' (a target metric value).
    default: relative
  guardrail_judge:
    description: >-
      Optional judge guardrail as 'name:threshold' (e.g. 'modularity:4.0'). Empty
      (the default) => no judge guardrail; a blank value is ignored by RLM/companion lanes.
    default: ''
  # RLM sampling knobs — used by the standalone scheduled ail-continuous-rlm job.
  rlm_sample_rate:
    description: Deterministic trace-id sample rate; 1.0 reviews every eligible trace.
    default: '1.0'
  rlm_max_reviews_per_run:
    description: Hard cap on HALO reviews performed by one scheduled RLM firing.
    default: '8'
  rlm_max_workers:
    description: Bounded parallel HALO reviews per firing.
    default: '4'
  rlm_min_tokens:
    description: Token floor for RLM candidates; 0 includes small traces.
    default: '0'
  rlm_max_results:
    description: Max traces scanned per RLM firing before idempotency/sampling.
    default: '10000'
  rlm_max_turns:
    description: HALO max turns per agent arm for scheduled RLM reviews.
    default: '40'
  continuous_rlm_timeout_seconds:
    description: >-
      Hard wall-clock bound for one scheduled RLM batch. Any unassessed traces remain
      eligible for a queued later firing, so a hung HALO batch cannot starve arrivals.
    default: 7200
  # Standalone scheduled ail-continuous-rlm job — the dedicated high-powered RLM
  # deep-reviewer. It reuses the shared rlm_* sampling knobs and the shared goal vars
  # (objective_metric etc.) but runs on its own model, schedule, and pause switch.
  continuous_rlm_judge_model:
    description: >-
      HALO judge serving endpoint for the standalone scheduled RLM job. Defaults to the
      most powerful VIABLE judge: databricks-gpt-5-5-pro (Databricks Claude endpoints
      reject HALO's always-on parallel_tool_calls; gpt-5-6 does not exist on the gateway).
    default: databricks-gpt-5-5-pro
  continuous_rlm_reasoning_effort:
    description: >-
      Explicit HALO reasoning-effort override for the standalone RLM job (minimal | low |
      medium | high | xhigh). Empty (the default), 'none', or 'auto' (any case) all mean
      NO override => auto-resolve from the judge model, so databricks-gpt-5-5-pro gets
      xhigh despite HALO's hyphen-blind prefix check (setting 'none' does NOT disable
      reasoning — it reads as auto).
    default: ''
  continuous_rlm_min_time_between_triggers_seconds:
    description: >-
      Debounce floor for the RLM trace-table update trigger. This limits trigger
      churn; the run itself drains every eligible trace before exiting.
    default: 60
  continuous_rlm_wait_after_last_change_seconds:
    description: >-
      Quiet period after the last OTEL spans-table update before starting an RLM drain.
      A short delay coalesces all spans belonging to one completed trace.
    default: 61
  continuous_rlm_pause_status:
    description: UNPAUSED (the trace-arrival trigger is live) or PAUSED (deployed-but-dormant).
    default: UNPAUSED
  auto_align_cron:
    description: >-
      Quartz cron for the auto-align trigger. A schedule, not a trace-arrival
      trigger: the trace store is a VIEW (no table_update possible). Default is
      every five minutes so a newly completed human-label batch aligns promptly.
    default: '0 2/5 * * * ?'
  auto_align_pause_status:
    description: UNPAUSED (the auto-align schedule is live) or PAUSED (deployed-but-dormant).
    default: UNPAUSED
  auto_align_label_floor:
    description: >-
      Minimum HUMAN labels a judge needs before its FIRST MemAlign alignment.
      Below it the judge stays distrusted (unaligned). Default 20.
    default: '20'
  auto_align_agreement_floor:
    description: >-
      Minimum judge-vs-human agreement (on the held-out Human Anchor) to trust an
      aligned judge. An unmeasured or below-floor judge stays DISTRUSTED and is not
      promoted; a re-alignment that regresses below the prior version is rolled back.
    default: '0.7'
  auto_align_min_anchor_samples:
    description: >-
      Minimum scored anchor items below which the agreement measurement is treated
      as insufficient (fail closed -> distrusted). Raise so a tiny anchor cannot
      certify a judge. Default 1.
    default: '1'
  auto_align_numeric_tolerance:
    description: >-
      Absolute tolerance for float-label agreement (e.g. 1.0 for a 1-5 graded
      judge, counting a within-one-grade score as agreement). Default 0.0 (exact).
    default: '0.0'
  auto_align_sampling_rate:
    description: Scheduled-scorer sampling rate applied when a promoted judge is (re)registered.
    default: '1.0'
  auto_align_judges:
    description: >-
      Comma-separated judge names to auto-align (empty => all built-in scorers).
      A judge with fewer than auto_align_label_floor labels simply skips.
    default: ''
  judge_backfill_cron:
    description: Five-minute judge coverage repair cadence.
    default: '0 1/5 * * * ?'
  judge_backfill_pause_status:
    description: UNPAUSED keeps missing judge assessments converging to full coverage.
    default: UNPAUSED
  judge_backfill_max_evaluations:
    description: Maximum missing judge/trace pairs evaluated per firing.
    default: '32'
  judge_backfill_max_workers:
    description: Bounded parallel judge evaluations per firing.
    default: '4'
  auto_align_judge_model:
    description: >-
      Judge model URI used to score the anchor (empty => MLflow's default judge
      model for the Databricks-managed backend).
    default: ''
  auto_align_reflection_lm:
    description: >-
      MemAlign guideline-distillation model URI (empty => MLflow's default
      MemAlign). Set to drive the reflection model through the gateway explicitly.
    default: databricks:/databricks-claude-sonnet-4-6
  auto_align_embedding_model:
    description: MemAlign episodic-memory embedding model URI (only used with auto_align_reflection_lm).
    default: databricks:/databricks-gte-large-en
  auto_align_embedding_dim:
    description: Output dimension of the configured MemAlign embedding model.
    default: '1024'
  # Advisory-memory distiller — the standalone scheduled ail-advisory-memory-distiller
  # job (resources/memory_distiller.job.yml). WRITE side only; the Lakebase sync +
  # read/injection side are separate. Reuses the shared catalog/schema/experiment_id/
  # warehouse_id/agent_name/schedule_timezone/token_secret_* vars.
  memory_annotations_table:
    description: >-
      Fully-qualified OTEL annotations table the distiller reads RLM + L2-judge
      feedback from. Fail-closed empty default (do NOT hardcode a reference-workspace
      id — #67/#5). On dais-demo this is
      austin_choi_omni_agent_catalog.mlflow_traces.cc_otel_annotations.
    default: ''
  memory_distiller_model:
    description: >-
      Claude model (served via FMAPI) the distiller uses to distill feedback into
      guideline rows. Plain SDK loop (not HALO), so Opus is fine. Verified served on
      dais-demo.
    default: databricks-claude-opus-4-6
  memory_distiller_cron:
    description: >-
      Quartz cron for the distiller schedule (sec min hour day-of-month month
      day-of-week). Default every fifteen minutes after RLM/MLflow assessments land.
    default: '0 7/15 * * * ?'
  memory_distiller_pause_status:
    description: >-
      UNPAUSED (the default) or PAUSED for an intentional maintenance window.
    default: UNPAUSED
  memory_max_turns:
    description: HALO-free Claude Agent SDK max turns per distiller firing (keeps a run bounded).
    default: '30'
  memory_max_assessments:
    description: >-
      Max recent assessments distilled per firing. Bounds the single-run token budget
      so the once-minted OAuth bearer never expires mid-run.
    default: '200'
  memory_task_suite_version:
    description: >-
      Frozen Task Suite artifact version whose source_trace_ids seed the provenance
      wall's Task-Suite reserved set (bundled into the wheel).
    default: v1
  memory_groundtruth_root:
    description: >-
      Optional path to a JSON ground-truth store; when set, the Human-Anchor pool's
      case ids extend the provenance wall. Empty => Human-Anchor reserved set is empty
      (honest for a workspace with no promoted anchor cases); the Task-Suite wall is
      always enforced.
    default: ''
  token_secret_scope:
    description: >-
      Optional Databricks secret scope holding the run-as bearer token for the
      v4 trace store (production-hardened path). Empty => the Job mints a
      short-lived OAuth bearer from its own run-as identity at runtime.
    default: ''
  token_secret_key:
    description: Secret key within token_secret_scope (only used when the scope is set).
    default: ''
  framework_sp_id:
    description: >-
      Application (client) id of the SINGLE framework service principal that all
      framework jobs (this publish job + future scheduled scorers / L3 / MemAlign)
      run as, so ONE warehouse grant covers everything. Empty (the default) => jobs
      run as the deploying identity, which is what the verification deploy and the
      default `dais_demo` target use. Set this AND deploy the `dais_demo_sp` target
      to run every job as the SP. Reuse the ail-self-optimizer App's auto-provisioned
      SP here so the App and the jobs share one identity and one grant (see
      docs/DEPLOY.md).
    default: ''
  job_run_as:
    description: >-
      run_as identity applied to every job in this bundle (bundle-level run_as is
      the single knob that covers the publish job AND any future jobs added to
      resources/). Defaults to the deploying user so the verification deploy needs
      no service principal; the `dais_demo_sp` target overrides it with
      ${var.framework_sp_id}.
    type: complex
    default:
      user_name: ${workspace.current_user.userName}

# Bundle-level run_as: applies to the publish job and every future job declared
# under resources/, so a single service principal (and thus a single warehouse
# CAN_USE grant) covers the whole framework. Override per-target via job_run_as.
run_as: ${var.job_run_as}

targets:
  # Single workspace target; host + auth resolve from the Databricks CLI profile
  # given at deploy time (e.g. --profile dais-demo). The host is intentionally not
  # hardcoded so the same bundle deploys to any workspace.
  #
  # `dais_demo` (default): jobs run as the deploying identity (job_run_as default).
  # Use this for the admin verification deploy — no service principal required.
  dais_demo:
    default: true

  # `dais_demo_sp`: identical workspace, but every job runs as the single framework
  # service principal. Deploy turnkey with the SP id as a plain string var, e.g.
  #   databricks bundle deploy -t dais_demo_sp --var framework_sp_id=<app-sp-id> --profile dais-demo
  # (Deploying this target without framework_sp_id fails fast with
  # "run_as section must specify exactly one identity" — that guard is intentional.)
  dais_demo_sp:
    variables:
      job_run_as:
        service_principal_name: ${var.framework_sp_id}
